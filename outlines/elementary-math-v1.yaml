          - id: num-and-ops-fractions
            label: 考点二 分数的认识
          - id: num-and-ops-percents
            label: 考点三 百分数的认识
          - id: num-and-ops-rational-conversion
            label: 考点四 小数、分数、百分数之间的互化
          - id: num-and-ops-reciprocal
            label: 考点五 倒数
      - id: num-and-ops-signed
