# elementary-math-v1 outline (v1.0.1, reviewed 2026-07-10).
# v1.0.1 adds ``negative_keywords`` to ``typical-chickens-rabbits`` so
# that geometry-heavy chapter summaries which happen to drop a single
# 鸡兔同笼 杂题 no longer pull the chickens-rabbits leaf in.
#
# Derived from the table of contents of 《学之舟小学生知识通-数学》
# (a 小学生数学总复习 workbook). The TOC declares seven "专题" plus a
# 知识通 综合应用 part. Each 专题 is broken down into 第一节 / 第二节
# / ... 节点, and each 节 into "考点一/二/..." entries which are the
# natural leaf level for per-topic exports.
#
# Design notes:
#   * Geometry topics ("图形与几何") are emphasised because the project
#     focus is geometry import into DeepTutor, but every 专题 is kept
#     so the outline can drive full-book exports too.
#   * 专题七 综合与实践应用 was merged from the book's 8 节 down to 4
#     top-level blocks (探索规律 / 应用题 / 典型问题 / 解决策略).
#     Leaf granularity is unchanged; "应用题" and "典型问题" keep
#     internal section containers as non-leaf children for grouping.
#   * "图形与运动" and "图形与位置" stay under 专题五 几何, mirroring
#     the textbook ordering and keeping geometry exports coherent.
#   * Topic ids follow the slug rule `[a-z0-9][a-z0-9_-]*`. Numbers
#     become ASCII digits; Chinese numerals are converted to Arabic
#     digits when natural ("num-and-ops" rather than "shu-yu-yun-suan").
#   * 7 张思维导图走 Stage 4b fallback — outline 不预设 hint。先跑
#     OutlineMatcher,看到 unclassified_items 后再决定是否升级。

outline_id: elementary-math-v1
name: 学之舟小学生知识通-数学 (elementary math review)
version: 1.0.1

applies_to:
  subject: math
  stage: elementary

topics:
