# Vocabulary. Only the leaf topics that are most likely to surface in
# extracted items get explicit keyword lists. Interior topics still get
# matches via descendant keywords (the matcher walks the tree).
# Keep keywords lowercase ASCII where possible; Chinese substrings
# remain as-is. Patterns are matched as regular expressions against
# the searchable text.
vocabulary:
  # --- 专题一 数与运算 ---
  num-and-ops-integers-classify:
    keywords: ["整数", "自然数", "正整数", "负整数", "零"]
  num-and-ops-integers-read-write:
    keywords: ["读数", "写数", "改写", "数位", "位数", "万级", "亿级"]
  num-and-ops-integers-compare:
    keywords: ["比较大小", "位数不同", "位数相同", "从高位"]
  num-and-ops-factors-and-multiples:
    keywords: ["因数", "倍数", "公因数", "公倍数"]
    patterns: ["因数与倍数", "倍数与因数"]
  num-and-ops-parity:
    keywords: ["奇数", "偶数", "单数", "双数"]
  num-and-ops-primes:
    keywords: ["质数", "素数", "合数", "分解质因数", "质因数"]
  num-and-ops-decimals:
    keywords: ["小数", "小数点", "小数部分", "整数部分", "纯小数", "带小数"]
  num-and-ops-fractions:
    keywords: ["分数", "分母", "分子", "分数线", "真分数", "假分数", "带分数"]
  num-and-ops-percents:
    keywords: ["百分数", "百分比", "百分号", "百分率"]
  num-and-ops-rational-conversion:
    keywords: ["互化", "小数化分数", "分数化小数", "百分数化分数", "分数化百分数"]
    patterns: ["小数\\s*[、，,]\\s*分数\\s*[、，,]\\s*百分数"]
  num-and-ops-reciprocal:
    keywords: ["倒数", "乘积为1"]
  num-and-ops-signed:
    keywords: ["正数", "负数", "正负数", "相反数"]
  num-and-ops-arithmetic-meaning:
    keywords: ["加法", "减法", "乘法", "除法", "四则运算", "运算的意义"]
  num-and-ops-arithmetic-rules:
    keywords: ["运算法则", "进位", "退位", "小数加减", "小数乘法", "分数加减", "分数乘法"]
  num-and-ops-arithmetic-estimation:
    keywords: ["估算", "大约", "取近似"]
  num-and-ops-arithmetic-order:
    keywords: ["运算顺序", "先算", "括号", "同级运算"]
  num-and-ops-arithmetic-laws:
    keywords: ["加法交换律", "加法结合律", "乘法交换律", "乘法结合律", "乘法分配律", "运算律", "运算性质"]
  num-and-ops-arithmetic-change:
    keywords: ["和的变化", "差的变化", "积的变化", "商的变化", "变化规律"]
  num-and-ops-arithmetic-zero-one:
    keywords: ["任何数和0相", "1乘", "0除", "0加", "0减"]
  num-and-ops-arithmetic-shortcuts:
    keywords: ["速算", "凑整", "拆分", "凑十法", "破十法", "借十法", "凑百法"]
  num-and-ops-arithmetic-defined:
    keywords: ["定义新运算", "新运算", "符号运算"]
    patterns: ["[a*]+\\s*[▲◎☆★]"]

  # --- 专题二 式与方程 ---
  algebra-letter-purpose:
    keywords: ["用字母表示数", "字母表示", "字母的作用"]
  algebra-letter-requirements:
    keywords: ["数字与字母相乘", "省略乘号", "字母与字母相乘"]
  algebra-letter-quantities:
    keywords: ["路程", "速度", "时间", "工作效率", "总价", "数量", "常见数量关系"]
    patterns: ["工作\\s*效率", "总\\s*价\\s*=\\s*单价"]
  algebra-letter-laws:
    keywords: ["用字母表示运算定律", "用字母表示运算性质"]
  algebra-letter-formulas:
    keywords: ["公式", "面积公式", "周长公式", "体积公式"]
  algebra-letter-evaluation:
    keywords: ["求值", "代入", "字母取值"]
  algebra-equations-equals:
    keywords: ["等式", "方程", "方程的解"]
  algebra-equations-solve:
    keywords: ["解方程", "方程两边", "未知数"]
  algebra-equations-modeling:
    keywords: ["列方程", "实际问题", "设未知数"]

  # --- 专题三 常见的量 ---
  measurements-units:
    keywords: ["长度单位", "面积单位", "体积单位", "质量单位", "时间单位", "人民币", "换算", "进率"]
    patterns: ["1千米\\s*=\\s*1000米"]
  measurements-renaming:
    keywords: ["名数", "改写", "单位换算", "单名数", "复名数"]
  measurements-word-problems:
    keywords: ["计量单位的实际问题", "时间问题", "质量实际问题"]

  # --- 专题四 比和比例 ---
  ratio-intro:
    keywords: ["比", "比的意义", "比值", "前项", "后项", "化简比"]
  proportion-intro:
    keywords: ["比例", "比例的意义", "比例的项", "比例的基本性质", "解比例"]
  direct-and-inverse:
    keywords: ["正比例", "反比例", "相关联的量", "比值一定", "积一定"]
  scale:
    keywords: ["比例尺", "图上距离", "实际距离", "数值比例尺", "线段比例尺"]
    patterns: ["图上\\s*距离\\s*[：:]\\s*实际\\s*距离"]
